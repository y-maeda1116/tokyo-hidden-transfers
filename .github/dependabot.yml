version: 2
updates:
  # GitHub Actions の定期的なバージョンアップ
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - dependencies
      - automated

  # npm パッケージの定期的なバージョンアップ
  # ※ eslint は security-base ワークフロー互換のため 8.57.1 に固定しており、
  #    下記 ignore で 9/10 系への更新を抑止している。
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - dependencies
      - automated
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
