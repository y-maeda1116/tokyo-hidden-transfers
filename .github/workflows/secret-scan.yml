name: Secret Scan

# security-base の再利用可能ワークフローで Trivy によるシークレット検出を実施する。
# 参考: https://github.com/y-maeda1116/security-base
on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    uses: y-maeda1116/security-base/.github/workflows/reusable-secret-scan.yml@main
    with:
      scan-tool: 'trivy'
