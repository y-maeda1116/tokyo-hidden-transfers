name: TypeScript Security

# セキュリティチェック: npm audit + ESLint(security-base 設定取り込み)。
# 注: TypeScript 7 は typescript-eslint のサポート範囲外(peer typescript <6.1.0)のため、
# ESLint は security-base のセキュリティルール設定を取り込むものの、TS ファイルの
# 実行時パースは不可。型安全性は tsc、シークレット検出は secret-scan(Trivy) で代替する。
# TS/.tsx がリント対象外のとき exit 2 で CI が赤になるのを防ぐため
# --no-error-on-unmatched-pattern を付与する。
# 参考: https://github.com/y-maeda1116/security-base
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    name: npm audit & ESLint security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high and above)
        run: npm audit --audit-level=high
      - name: ESLint security check
        run: npx eslint --config .eslintrc.base.json --no-error-on-unmatched-pattern .
